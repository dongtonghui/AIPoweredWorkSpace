<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03 场景设定</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F3ED;
      --panel: #FFFFFF;
      --border: #E5DDD2;
      --text: #2C241B;
      --muted: #7D7166;
      --accent: #B85C38;
      --green: #4A7C59;
      --blue: #4A6FA5;
      --serif: "Playfair Display", Georgia, serif;
      --sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
    }
    html, body {
      width: 1920px; height: 1080px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      position: relative;
    }
    .texture {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }
    .slide {
      width: 100%; height: 100%;
      padding: 80px 110px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }
    .header { margin-bottom: 48px; }
    .kicker {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    h2 {
      font-family: var(--serif);
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    h2 .weak { color: var(--muted); font-weight: 600; }

    .timeline {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      position: relative;
      padding-left: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 47px;
      top: 40px;
      bottom: 40px;
      width: 2px;
      background: var(--border);
    }
    .timeline-line-animated {
      position: absolute;
      left: 47px;
      top: 40px;
      bottom: 40px;
      width: 2px;
      background: var(--border);
      transform-origin: top;
      transform: scaleY(0);
      animation: scaleLine 1.5s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }
    @keyframes scaleLine {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .event {
      display: flex;
      align-items: flex-start;
      gap: 36px;
    }
    .time {
      width: 90px;
      flex-shrink: 0;
      font-family: var(--mono);
      font-size: 16px;
      color: var(--muted);
      text-align: right;
      padding-top: 14px;
    }
    .dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--panel);
      border: 3px solid var(--accent);
      flex-shrink: 0;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }
    .dot.green { border-color: var(--green); }
    .dot.blue { border-color: var(--blue); }
    .card {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 4px 16px rgba(44, 36, 27, 0.04);
    }
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .card-role {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--mono);
      text-transform: uppercase;
    }
    .card-role.pm { background: rgba(184, 92, 56, 0.1); color: var(--accent); }
    .card-role.rd { background: rgba(74, 111, 165, 0.1); color: var(--blue); }
    .card-role.both { background: rgba(74, 124, 89, 0.1); color: var(--green); }
    .card-title {
      font-size: 20px;
      font-weight: 700;
    }
    .card-desc {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.55;
    }

    /* Keyframes */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideInLeft {
      from { opacity: 0; transform: translateX(-40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeSlideInRight {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes drawLine {
      from { stroke-dashoffset: 1000; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Animation classes */
    .anim-fade-up {
      opacity: 0;
      animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
    }
    .anim-fade-left {
      opacity: 0;
      animation: fadeSlideInLeft 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
    }
    .anim-fade-right {
      opacity: 0;
      animation: fadeSlideInRight 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
    }
    .anim-scale {
      opacity: 0;
      animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      will-change: transform, opacity;
    }
    .anim-float {
      animation: float 6s ease-in-out infinite;
      will-change: transform;
    }

    /* Stagger delays */
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
    .delay-6 { animation-delay: 0.6s; }
    .delay-7 { animation-delay: 0.7s; }
    .delay-8 { animation-delay: 0.8s; }
  </style>
</head>
<body>
  <div class="texture"></div>
  <div class="slide">
    <div class="header">
      <div class="kicker anim-fade-left delay-1">SCENARIO</div>
      <h2 class="anim-fade-up delay-2">一个典型的工作日：<span class="weak">PM 和 RD 在信息碎片中挣扎</span></h2>
    </div>

    <div class="timeline">
      <div class="timeline-line-animated"></div>
      <div class="event anim-fade-left delay-2">
        <div class="time">09:30</div>
        <div class="dot anim-scale delay-3"></div>
        <div class="card">
          <div class="card-header">
            <span class="card-role pm">PM</span>
            <span class="card-title">在钉钉群发新版 PRD 链接</span>
          </div>
          <div class="card-desc">“这是 V3，大家按这个评审”，但群里已经有过 V1、V2、V2.5 三个链接。</div>
        </div>
      </div>

      <div class="event anim-fade-left delay-3">
        <div class="time">10:15</div>
        <div class="dot blue anim-scale delay-4"></div>
        <div class="card">
          <div class="card-header">
            <span class="card-role rd">RD</span>
            <span class="card-title">翻邮件找上周确认的需求口径</span>
          </div>
          <div class="card-desc">研发同学记得“这里要改”，但找不到是哪封邮件、哪条评论说的。</div>
        </div>
      </div>

      <div class="event anim-fade-left delay-4">
        <div class="time">14:00</div>
        <div class="dot green anim-scale delay-5"></div>
        <div class="card">
          <div class="card-header">
            <span class="card-role both">PM + RD</span>
            <span class="card-title">开会同步：原型和代码又对不上了</span>
          </div>
          <div class="card-desc">Figma 里的交互改了，GitHub 代码没同步；等演示时才发现线上还是旧版。</div>
        </div>
      </div>

      <div class="event anim-fade-left delay-5">
        <div class="time">17:30</div>
        <div class="dot anim-scale delay-6"></div>
        <div class="card">
          <div class="card-header">
            <span class="card-role pm">PM</span>
            <span class="card-title">临下班又拉群：“最新版以我刚发的为准”</span>
          </div>
          <div class="card-desc">一天结束，信息更加分散，明天继续循环。</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
