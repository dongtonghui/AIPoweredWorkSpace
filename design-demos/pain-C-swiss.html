<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pain Demo C - Bold Swiss</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF;
      --text: #1A1A1A;
      --muted: #666666;
      --accent: #E63946;
      --border: #1A1A1A;
      --sans: "Space Grotesk", Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      --body: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    html, body {
      width: 1920px; height: 1080px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      overflow: hidden;
      position: relative;
    }
    .slide {
      width: 100%; height: 100%;
      padding: 70px 100px;
      display: flex;
      flex-direction: column;
    }
    .header {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 4px solid var(--border);
    }
    .kicker {
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    h2 {
      font-family: var(--sans);
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    h2 .weak { color: var(--muted); font-weight: 500; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      flex: 1;
      min-height: 0;
      border: 4px solid var(--border);
    }
    .card {
      padding: 36px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 4px solid var(--border);
    }
    .card:last-child { border-right: none; }
    .card-num {
      font-family: var(--sans);
      font-size: 72px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .card-title {
      font-family: var(--sans);
      font-size: 28px;
      font-weight: 700;
    }
    .card-desc {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.65;
      flex: 1;
    }
    .card-tag {
      padding: 10px 16px;
      border: 3px solid var(--border);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      width: fit-content;
    }

    .bottom-bar {
      margin-top: 36px;
      padding: 28px 32px;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bottom-bar .quote {
      font-family: var(--sans);
      font-size: 26px;
      font-weight: 700;
    }
    .bottom-bar .stat {
      font-size: 18px;
      font-weight: 600;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="header">
      <div class="kicker">Pain Point 01</div>
      <h2>
        文档散落在 <span class="weak">钉钉、邮件、微信群</span>
      </h2>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-num">01</div>
        <div class="card-title">钉钉里丢链接</div>
        <div class="card-desc">
          群里@全员发文档链接，过几天就被消息淹没。新人入职想查历史需求，需要爬楼几十屏。
        </div>
        <div class="card-tag">Lost in Chat</div>
      </div>

      <div class="card">
        <div class="card-num">02</div>
        <div class="card-title">邮件里串版本</div>
        <div class="card-desc">
          评审意见散落在邮件回复链里，研发同学需要手动汇总。版本一变，前面的结论就失效。
        </div>
        <div class="card-tag">Version Chaos</div>
      </div>

      <div class="card">
        <div class="card-num">03</div>
        <div class="card-title">微信群里拍脑袋</div>
        <div class="card-desc">
          关键决策只留在群聊上下文，没有沉淀。产品改方向了，但文档没更新。
        </div>
        <div class="card-tag">No Source</div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="quote">结果：找文档 10 分钟，确认版本 20 分钟，真正理解需求 5 分钟。</div>
      <div class="stat">效率损失 > 70%</div>
    </div>
  </div>
</body>
</html>
