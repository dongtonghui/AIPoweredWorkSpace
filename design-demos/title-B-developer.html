<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Title Demo B - Cool Developer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1A1D23;
      --panel: #22262E;
      --border: #30363D;
      --text: #E6EDF3;
      --muted: #8B949E;
      --accent: #3B82F6;
      --accent-2: #06B6D4;
      --sans: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: "JetBrains Mono", monospace;
    }
    html, body {
      width: 1920px; height: 1080px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
      position: relative;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(48,54,61,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(48,54,61,0.4) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at 30% 50%, black 0%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at 30% 50%, black 0%, transparent 70%);
      pointer-events: none;
    }
    .slide {
      width: 100%; height: 100%;
      padding: 100px 120px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .window {
      position: absolute;
      right: 100px;
      top: 50%;
      transform: translateY(-50%);
      width: 520px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .window-header {
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .window-dot { width: 12px; height: 12px; border-radius: 50%; }
    .window-dot.r { background: #FF5F56; }
    .window-dot.y { background: #FFBD2E; }
    .window-dot.g { background: #27C93F; }
    .window-body {
      padding: 24px;
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.8;
      color: var(--muted);
    }
    .window-body .prompt { color: var(--accent-2); }
    .window-body .cmd { color: var(--text); }
    .window-body .out { color: var(--accent); }

    .top-bar {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
    }
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 900px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 13px;
      margin-bottom: 36px;
      width: fit-content;
    }
    .badge::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    h1 {
      font-family: var(--mono);
      font-size: 68px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 28px;
    }
    h1 .accent { color: var(--accent); }
    h1 .accent-2 { color: var(--accent-2); }
    .subtitle {
      font-size: 24px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 640px;
    }
    .bottom {
      display: flex;
      gap: 40px;
      font-family: var(--mono);
      font-size: 14px;
      color: var(--muted);
    }
    .bottom strong { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>
  <div class="grid"></div>

  <div class="slide">
    <div class="top-bar">
      >_ internal-sharing / 2026.06.26
    </div>

    <div class="window">
      <div class="window-header">
        <span class="window-dot r"></span>
        <span class="window-dot y"></span>
        <span class="window-dot g"></span>
      </div>
      <div class="window-body">
        <span class="prompt">$</span> <span class="cmd">hermes-agent deploy prototype</span><br />
        <span class="out">→ Generating PRD...</span><br />
        <span class="out">→ Building HTML prototype...</span><br />
        <span class="out">→ Pushing to GitHub...</span><br />
        <span class="out">→ URL ready: https://acme.github.io/prototype</span>
      </div>
    </div>

    <div class="content">
      <div class="badge">AI 时代产研协作</div>
      <h1>
        基于 <span class="accent">GitHub</span><br />
        打通 <span class="accent-2">Idea → 文档 → 原型 URL</span>
      </h1>
      <div class="subtitle">
        面向产品经理与研发小伙伴的内部分享
      </div>
    </div>

    <div class="bottom">
      <span><strong>分享人</strong>: Kris</span>
      <span><strong>日期</strong>: 2026.06.26</span>
      <span><strong>时长</strong>: 30 min</span>
    </div>
  </div>
</body>
</html>
