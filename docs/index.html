<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Projects</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F3ED;
      --panel: #FFFFFF;
      --border: #E5DDD2;
      --text: #2C241B;
      --muted: #7D7166;
      --accent: #B85C38;
      --accent-light: #D4805A;
      --sage: #8FA68E;
      --sage-dark: #6B8E6B;
      --charcoal: #2D3436;
    }
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }
    .header p {
      font-size: 15px;
      color: var(--muted);
    }
    .project-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .project-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .project-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(44,36,27,0.08);
    }
    .project-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .project-icon.membership {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
    }
    .project-icon.ringlight {
      background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    }
    .project-info {
      flex: 1;
    }
    .project-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .project-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .project-arrow {
      font-size: 20px;
      color: var(--muted);
      transition: transform 0.2s;
    }
    .project-card:hover .project-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Demo Projects</h1>
      <p>可交互原型演示集合</p>
    </div>

    <div class="project-list">
      <a href="../index.html" class="project-card" style="border-color: var(--accent); background: rgba(184, 92, 56, 0.04);">
        <div class="project-icon" style="background: linear-gradient(135deg, #2C241B 0%, #4A7C59 100%);">📊</div>
        <div class="project-info">
          <div class="project-name">AI 时代基于 GitHub 的产研协作</div>
          <div class="project-desc">幻灯片演示 — 面向产品经理与研发小伙伴的内部分享</div>
        </div>
        <div class="project-arrow">→</div>
      </a>
      <a href="membership/" class="project-card">
        <div class="project-icon membership">🏅</div>
        <div class="project-info">
          <div class="project-name">Acme Mall 会员中心</div>
          <div class="project-desc">会员等级体系、积分商城、付费订阅、成长值明细等完整会员功能演示</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a href="ring-light/" class="project-card">
        <div class="project-icon ringlight">💡</div>
        <div class="project-info">
          <div class="project-name">Maygrove Light Controller</div>
          <div class="project-desc">智能植物灯控制器，支持亮度调节、光谱切换、定时开关、睡眠模式等</div>
        </div>
        <div class="project-arrow">→</div>
      </a>
    </div>

    <div class="footer">
      <p>© 2026 AIPoweredWorkSpace</p>
    </div>
  </div>
</body>
</html>
